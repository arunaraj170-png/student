<!DOCTYPE html>
<html>
<head>
<title>Student Management System</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:0;
}

.container{
    width:800px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    padding:10px;
    margin:5px;
    width:28%;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.add{
    background:#28a745;
}

.update{
    background:#007bff;
}

.delete{
    background:#dc3545;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table,th,td{
    border:1px solid #ddd;
}

th{
    background:#333;
    color:white;
}

th,td{
    padding:10px;
    text-align:center;
}

tr:hover{
    background:#f5f5f5;
}

</style>
</head>

<body>

<div class="container">

<h2>Student Management System</h2>

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="roll" placeholder="Roll No">
<input type="text" id="course" placeholder="Course">

<button class="add" onclick="addStudent()">Add Student</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Roll No</th>
<th>Course</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="studentList">
</tbody>

</table>

</div>

<script>

let students = [];
let editIndex = -1;

function addStudent(){

let name = document.getElementById("name").value;
let roll = document.getElementById("roll").value;
let course = document.getElementById("course").value;

if(name=="" || roll=="" || course==""){
alert("Please fill all fields");
return;
}

let student = {name,roll,course};

if(editIndex === -1){
students.push(student);
}else{
students[editIndex] = student;
editIndex = -1;
}

document.getElementById("name").value="";
document.getElementById("roll").value="";
document.getElementById("course").value="";

displayStudents();
}

function displayStudents(){

let table = "";

students.forEach((s,index)=>{

table += `<tr>
<td>${s.name}</td>
<td>${s.roll}</td>
<td>${s.course}</td>
<td>
<button class="update" onclick="editStudent(${index})">Edit</button>
<button class="delete" onclick="deleteStudent(${index})">Delete</button>
</td>
</tr>`;

});

document.getElementById("studentList").innerHTML = table;

}

function editStudent(index){

let s = students[index];

document.getElementById("name").value = s.name;
document.getElementById("roll").value = s.roll;
document.getElementById("course").value = s.course;

editIndex = index;

}

function deleteStudent(index){

students.splice(index,1);

displayStudents();

}

</script>

</body>
</html>
